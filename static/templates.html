<!DOCTYPE html>
<html lang="en">
<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Templates</title>
		<link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; flex-direction: column;">

		<header>
			<h1>Templates</h1>
		</header>

        <main>
            <div id="templates-info-side">
                <div id="time-slots">
                    <div class="slot">
                        <div class="time-label">
                            <h3>1</h3>
                        </div>
                        <div class="time-slot"></div>
                    </div>
                </div>
                <div id="enemy-data">
                    <div class="enemy" data-id="1">
                        <div class="enemy-header">
                            <div><h3 class="icon">H</h3></div>
                            <h3 class="name">HELO</h3>
                            <div><h3 class="armor">2</h3></div>
                        </div>
                        <div class="controls">
                            <button>Close</button>
                            <button>Retreat</button>
                            <button>Rotate CW</button>
                            <button>Rotate CCW</button>
							<button style="grid-column: 1 / 3;">T+1</button>
							<button style="grid-column: 3 / 5;">T-1</button>
                        </div>
                        <div class="attacks">
                            <div class="attack">
                                <div class="active"></div>
                                <div class="attack-name">Missiles</div>
                                <div class="attribute">recoil</div>
                                <div class="range">M</div>
                                <div class="power">P4</div>
                                <div class="time">T4</div>
                                <div class="pips">
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                </div>
                            </div>
                            <div class="attack">
                                <div class="active"></div>
                                <div class="attack-name">Machine Gun</div>
                                <div class="attribute"></div>
                                <div class="range">S</div>
                                <div class="power">P2</div>
                                <div class="time">T1</div>
                                <div class="pips">
                                    <div class="pip"></div>
                                    <div class="pip"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
			<div id="controls">
                <!-- <h2>Controls</h2> -->
				<div id="controls-container">
					<div id="action" style="grid-area: action;">
						<h3>Action</h3>
						<button onclick="advanceTime()">End Action / Tick</button>
					</div>
					<div id="stance" class="control-group" style="grid-area: stance;">
						<h3>Stance</h3>
					</div>
					<div id="shoulder-right" class="mount-group" style="grid-area: shr;">
						<h3>Shoulder Right</h3>
						<div class="weapon-slot"></div>
					</div>
					<div id="shoulder-left" class="mount-group" style="grid-area: shl;">
						<h3>Shoulder Left</h3>
						<div class="weapon-slot">
							<div class="mount">Left Shoulder Mount</div>
							<div class="weapon-header">
								<div class="name">WING SHIELD</div>
								<div class="attribute">REFLEX</div>
								<div class="armor">4</div>
							</div>
							<div class="weapon-info">
								<div class="attacks">
									<div class="attack">
										<div class="active"></div>
										<div class="name">DEFEND</div>
										<div class="power">P0</div>
										<div class="time">T1</div>
										<div class="pips">
											<div class="pip"></div>
											<div class="pip"></div>
										</div>
									</div>
									<div class="attack">
										<div class="active"></div>
										<div class="name">DEFEND</div>
										<div class="power">P0</div>
										<div class="time">T1</div>
										<div class="pips">
											<div class="pip"></div>
											<div class="pip"></div>
										</div>
									</div>
									<div class="attack">
										<div class="active"></div>
										<div class="name">DEFEND</div>
										<div class="power">P0</div>
										<div class="time">T1</div>
										<div class="pips">
											<div class="pip"></div>
											<div class="pip"></div>
										</div>
									</div>
								</div>
								<div class="info">
									<div class="weight">1</div>
									<div class="arc">1, 2, 3, 4</div>
									<div class="range">-</div>
								</div>
							</div>
						</div>
					</div>
					<div id="arm-right" class="mount-group" style="grid-area: arr;">
						<h3>Arm Right</h3>
						<div class="weapon-slot"></div>
					</div>
					<div id="arm-left" class="mount-group" style="grid-area: arl;">
						<h3>Arm Left</h3>
						<div class="weapon-slot"></div>
					</div>
					<div id="torso" class="control-group" style="grid-area: torso;">
						<h3>Torso</h3>
					</div>
					<div id="legs" class="control-group" style="grid-area: legs;">
						<h3>Legs</h3>
						<button onclick="movePlayer('forward')">Walk Forward</button>
						<button onclick="movePlayer('backward')">Walk Backward</button>
						<button onclick="movePlayer('turn-cw')">Turn CW</button>
						<button onclick="movePlayer('turn-ccw')">Turn CCW</button>
					</div>
				</div>
				
            </div>
        </main>

		<footer>
			<p>&copy; Me</p>
		</footer>

</body>
</html>
