<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paper 'Mech Digital</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div id="game-container">
        <div id="main-container">
            <div id="radar-container">
                <svg width="100%" height="100%" version="1.1" xmlns="http://www.w3.org/2000/svg">
                    <circle class="main-circle radar-line" cx="50%" cy="50%" r="49%" stroke="green" stroke-width="2" fill="black" />
                    <circle class="radar-line" cx="50%" cy="50%" r="37.5%" stroke="green" stroke-width="1" fill="none" />
                    <circle class="radar-line" cx="50%" cy="50%" r="25%" stroke="green" stroke-width="1" fill="none" />
                    <circle class="radar-line" cx="50%" cy="50%" r="12.5%" stroke="green" stroke-width="1" fill="none" />
                    <line class="radar-line" x1="50%" y1="0" x2="50%" y2="100%" stroke="green" stroke-width="1"/>
                    <line class="radar-line" x1="0" y1="50%" x2="100%" y2="50%" stroke="green" stroke-width="1"/>
                    <line class="radar-line" x1="0" y1="0" x2="100%" y2="100%" stroke="green" stroke-width="1"/>
                    <line class="radar-line" x1="100%" y1="0" x2="0" y2="100%" stroke="green" stroke-width="1"/>
                    <circle class="player" cx="50%" cy="50%" r="10" fill="blue" /> <!-- Player -->
                    <rect class="border" x="0" y="0" width="100%" height="100%" fill="none" stroke="green" stroke-width="2"/>
                    <div id="enemies">

                    </div>
                </svg>
            </div>
            <div id="enemy-data">
                <div class="enemy-ref" style="top: 50px; left: 150px;">E1</div>
                <div class="enemy-ref" style="top: 300px; left: 250px;">E2</div>
            </div>
        </div>
        <div id="ui-container">
            <div id="time-track">
                <h3>Time Track</h3>
                <div id="time-slots">
                    <div class="time-slot active-slot">
                        <div class="slot-label">A</div>
                        <div class="slot"></div>
                    </div>
                    <div class="time-slot">
                        <div class="slot-label">1</div>
                        <div class="slot"></div>
                    </div>
                    <div class="time-slot">
                        <div class="slot-label">2</div>
                        <div class="slot"></div>
                    </div>
                    <div class="time-slot">
                        <div class="slot-label">3</div>
                        <div class="slot"></div>
                    </div>
                    <div class="time-slot">
                        <div class="slot-label">4</div>
                        <div class="slot"></div>
                    </div>
                    <div class="time-slot">
                        <div class="slot-label">5</div>
                        <div class="slot"></div>
                    </div>
                    <div class="time-slot">
                        <div class="slot-label">6</div>
                        <div class="slot"></div>
                    </div>
                    <div class="time-slot">
                        <div class="slot-label">7</div>
                        <div class="slot"></div>
                    </div>
                </div>
            </div>

            <div id="controls">
                <div id="action" class="control-group" style="grid-area: action;">
                    <h3>Action</h3>
                    <button onclick="advanceTime()">End Action / Tick</button>
                </div>
                <div id="stance" class="control-group" style="grid-area: stance;">
                    <h3>Stance</h3>
                </div>
                <div id="shoulder-right" class="control-group" style="grid-area: shr;">
                    <h3>Shoulder Right</h3>
                </div>
                <div id="shoulder-left" class="control-group" style="grid-area: shl;">
                    <h3>Shoulder Left</h3>
                </div>
                <div id="arm-right" class="control-group" style="grid-area: arr;">
                    <h3>Arm Right</h3>
                </div>
                <div id="arm-left" class="control-group" style="grid-area: arl;">
                    <h3>Arm Left</h3>
                </div>
                <div id="torso" class="control-group" style="grid-area: torso;">
                    <h3>Torso</h3>
                </div>
                <div id="legs" class="control-group" style="grid-area: legs;">
                    <h3>Legs</h3>
                    <button onclick="movePlayer('forward')">Walk Forward</button>
                    <button onclick="movePlayer('backward')">Walk Backward</button>
                    <button onclick="movePlayer('turn-cw')">Turn CW</button>
                    <button onclick="movePlayer('turn-ccw')">Turn CCW</button>
                </div>
            </div>

            <div id="log"></div>
        </div>
    </div>
    <script src="static/game.js"></script>
</body>
</html>
