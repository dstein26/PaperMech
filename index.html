<!DOCTYPE html>
<html lang="en">
<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Paper 'Mech</title>
		<link rel="stylesheet" href="static/style.css">
</head>
<body>

		<header>
			<h1>Paper 'Mech</h1>
		</header>

		<main>
            <div id="info">
				<div id="radar">
					<h2>Radar</h2>
					<div id="radar-svg-container"></div>
				</div>

				<div id="time-track">
					<h3>Time Track</h3>
					<div id="time-slots">
					</div>						
				</div>

				<div id="enemy-data">
					<h3>Enemy Data</h3>
					<div id="enemy-list"></div>
				</div>

            </div>
            <div id="controls">
                <h2>Controls</h2>
                <p>Use the time track to plan your moves.</p>
                <p>Click on the radar to move or attack.</p>
            </div>
		</main>

		<div id="errors"></div>

		<!-- <footer>
			<p>&copy; Me</p>
		</footer> -->

		<script src="static/game.js"></script>
</body>
</html>
